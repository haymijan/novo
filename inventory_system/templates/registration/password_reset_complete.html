<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Complete</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {font-family: 'Poppins', sans-serif; background: #f0f4ff; display: flex; justify-content: center; align-items: center; height: 100vh;}
    .box {background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); width: 400px; text-align: center;}
    h2 {color: #2B3674; margin-bottom: 15px;}
    p {color: #444;}
    a {color: #667eea; font-weight: bold; text-decoration: none;}
  </style>
</head>
<body>
  <div class="box">
    <h2>Password reset complete ✅</h2>
    <p>Your new password has been set. You can now <a href="{% url 'login' %}">log in</a>.</p>
  </div>
</body>
</html>
