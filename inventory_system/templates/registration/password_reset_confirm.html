<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {font-family: 'Poppins', sans-serif; background: #f0f4ff; display: flex; justify-content: center; align-items: center; height: 100vh;}
    .box {background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.1); width: 400px;}
    h2 {color: #2B3674; margin-bottom: 20px; text-align: center;}
    .form-group {margin-bottom: 15px;}
    label {display: block; font-size: 14px; margin-bottom: 5px;}
    input {width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px;}
    button {width: 100%; padding: 12px; border: none; border-radius: 8px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-weight: 600; cursor: pointer;}
    p {text-align: center; color: #666;}
  </style>
</head>
<body>
  <div class="box">
    <h2>Set a new password</h2>
    {% if validlink %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          {{ form.as_p }}
        </div>
        <button type="submit">Change my password</button>
      </form>
    {% else %}
      <p>The password reset link was invalid, possibly because it has already been used.<br> Please request a new password reset.</p>
    {% endif %}
  </div>
</body>
</html>
